services:
  database:
    build:
      context: ./database
    container_name: techstore-database
    environment:
      POSTGRES_DB: techstore
      POSTGRES_USER: techstore
      POSTGRES_PASSWORD: techstore
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techstore -d techstore"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  security-service:
    build:
      context: ./security-service
    container_name: techstore-security-service
    depends_on:
      database:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://techstore:techstore@database:5432/techstore
      JWT_SECRET: techstore-super-secret
      JWT_EXPIRES_IN: 8h
      CORS_ORIGIN: http://localhost:8080
      MFA_CHALLENGE_TTL_MINUTES: 5
      MFA_MAX_ATTEMPTS: 3
      LOGIN_MAX_ATTEMPTS: 5
      LOGIN_LOCK_MINUTES: 15
      TOTP_ISSUER: TechStore Lab
      EMAIL_DELIVERY_MODE: preview
      SMTP_HOST: ""
      SMTP_PORT: 587
      SMTP_SECURE: "false"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: techstore@example.com
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
    container_name: techstore-frontend
    depends_on:
      - security-service
    ports:
      - "8080:80"

volumes:
  postgres_data:
